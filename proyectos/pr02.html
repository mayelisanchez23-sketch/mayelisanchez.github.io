<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PR02 | Ingeniería social</title>

<link rel="stylesheet" href="../assets/vendors/themify-icons/css/themify-icons.css">
<link rel="stylesheet" href="../assets/css/johndoe.css">

<style>
body{
  background:#f4f6f9;
}

/* HERO */
.pr02-hero{
  padding:120px 0 80px;
  background:linear-gradient(135deg, #111827, #1f2937);
  color:#fff;
}

/* TARJETAS */
.content-card{
  background:#fff;
  border-radius:20px;
  padding:30px;
  box-shadow:0 16px 35px rgba(0,0,0,0.08);
  margin-bottom:30px;
}

/* QUIZ */
.quiz-card{
  max-width:1000px;
  width:95%;
  margin:40px auto;
  padding:50px 40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.quiz-title{
  font-size:2.2rem;
  font-weight:800;
}

.quiz-sub{
  color:#6b7280;
  max-width:700px;
  margin:auto;
}

#question{
  font-size:1.6rem;
  margin:30px 0;
}

.quiz-buttons button{
  padding:14px 32px;
  font-size:1.1rem;
}

.progress-bar-container{
  height:10px;
  background:#e5e7eb;
  border-radius:10px;
  margin-bottom:20px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#ff6b81;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar sticky-top navbar-light bg-white">
  <div class="container">
    <a class="navbar-brand" href="../index.html">Mayeli Sánchez</a>
  </div>
</nav>

<!-- HERO -->
<header class="pr02-hero">
  <div class="container">
    <h1>PR02 - Ingeniería social</h1>
  </div>
</header>

<main>

<!-- QUIZ -->
<section class="section">
<div class="container">

<!-- INICIO -->
<div class="content-card quiz-card" id="start-screen">

<h2 class="quiz-title">Phishing Quiz</h2>

<p class="quiz-sub">
Simulación de escenarios reales para identificar ataques de phishing.
</p>

<input id="alias" placeholder="Ingresa tu alias"
class="form-control mb-3" style="max-width:300px;margin:auto;">

<button class="btn btn-primary btn-rounded" onclick="startQuiz()">
Comenzar
</button>

</div>

<!-- QUIZ -->
<div class="content-card quiz-card" id="quiz" style="display:none;">

<div class="progress-bar-container">
<div class="progress-bar" id="bar"></div>
</div>

<p id="progress"></p>

<div id="question"></div>

<div class="quiz-buttons">
<button class="btn btn-success m-2" onclick="answer('seguro')">✔ Seguro</button>
<button class="btn btn-danger m-2" onclick="answer('phishing')">❌ Phishing</button>
</div>

<p id="feedback"></p>

</div>

</div>
</section>

</main>

<script>
const quiz = [
{ q:"Correo del banco con link extraño", correct:"phishing", feedback:"Dominio falso"},
{ q:"Notificación en app oficial", correct:"seguro", feedback:"Canal seguro"},
{
q:`<div style="border:1px solid #ddd;padding:10px">
<b>Microsoft</b><br>Verifica aquí:<br>
<a>microsoft-security.net</a></div>`,
correct:"phishing",
feedback:"Dominio falso"
}
];

let current=0,score=0,player="";

function startQuiz(){
player=document.getElementById("alias").value;
if(!player){alert("Ingresa alias");return;}
document.getElementById("start-screen").style.display="none";
document.getElementById("quiz").style.display="block";
loadQuestion();
}

function loadQuestion(){
document.getElementById("question").innerHTML=quiz[current].q;
document.getElementById("progress").innerText=`Pregunta ${current+1}`;
document.getElementById("bar").style.width=(current/quiz.length*100)+"%";
}

function answer(user){
if(user===quiz[current].correct){score+=10;}
document.getElementById("feedback").innerText=quiz[current].feedback;

setTimeout(()=>{
current++;
if(current<quiz.length) loadQuestion();
else showResult();
},1000);
}

function showResult(){
document.getElementById("quiz").innerHTML=`
<h3>${player}</h3>
<p>Puntaje: ${score}</p>
<button onclick="location.reload()">Reintentar</button>
`;
}
</script>

</body>
</html>
